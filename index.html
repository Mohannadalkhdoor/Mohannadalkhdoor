<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مهند الخضور - الهوية الرقمية</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #f4f6f8;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            margin-bottom: 10px;
            color: #1a252f;
            font-size: 24px;
        }
        p {
            color: #555;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 12px 0;
            margin: 10px 0;
            background-color: #0066cc;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #004b99;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>مهند الخضور</h1>
        <p>خبير الرقابة والتدقيق الداخلي وإدارة التأمينات الصحية | صاحب مدونة مهند الخضور للمذكرات المهنية والتقارير الاستراتيجية.</p>
        <a href="https://mohannad-alkhdoor.blogspot.com" class="btn">زيارة المدونة الرسمية</a>
        <a href="https://bio.site/alkhdoor" class="btn" style="background-color: #2d3748;">بطاقة التعريف الرقمية</a>
    </div>
</body>
</html>
